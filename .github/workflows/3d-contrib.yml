name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "profile-3d-contrib/**"

permissions:
  contents: write

concurrency:
  group: profile-3d-contrib
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Create Settings JSON
        run: |
          cat << 'EOF' > setting.json
          {
            "githubUserName": "shyam-medh",
            "backgroundColor": "#0d1117",
            "foregroundColor": "#a78bfa",
            "frameColor": "#7c3aed",
            "color0": "#161b22",
            "color1": "#4c1d95",
            "color2": "#7c3aed",
            "color3": "#c026d3",
            "color4": "#f97316",
            "contribTypes": ["pullReq","issues","commits","repos","reviews"],
            "type": "green-animate",
            "outputStandalone": true
          }
          EOF

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: setting.json

      - name: Sync README graph assets
        run: |
          cp profile-3d-contrib/profile-customize.svg profile-3d-contrib/profile-night-rainbow.svg
          cp profile-3d-contrib/profile-customize.svg profile-3d-contrib/profile-south-season-animate.svg

      - name: Commit and push generated graph
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A profile-3d-contrib
          if git diff --staged --quiet; then
            echo "No 3D contribution changes to commit."
            exit 0
          fi
          git commit -m "update 3D contribution graph"
          git pull --rebase origin main
          git push
