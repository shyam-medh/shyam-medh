<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <style>
      .font { font-family: 'JetBrains Mono', monospace; }
      .a1 { animation: af1 3.2s ease-in-out infinite; }
      .a2 { animation: af2 3.8s ease-in-out infinite; }
      .a3 { animation: af3 3.0s ease-in-out infinite; }
      @keyframes af1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes af2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }
      @keyframes af3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      .glow-gold   { filter: drop-shadow(0 0 14px #f59e0bcc); }
      .glow-fire   { filter: drop-shadow(0 0 14px #ef4444cc); }
      .glow-star   { filter: drop-shadow(0 0 14px #a78bfacc); }
      .shine { animation: sp 2.5s ease-in-out infinite alternate; }
      @keyframes sp { from{opacity:0.06} to{opacity:0.2} }
      .ring { animation: ringPulse 2s ease-in-out infinite; }
      @keyframes ringPulse {
        0%,100% { stroke-width: 2; stroke-opacity: 0.5; }
        50%      { stroke-width: 4; stroke-opacity: 1.0; }
      }
      .counter { animation: countGlow 1.5s ease-in-out infinite alternate; }
      @keyframes countGlow {
        from { fill: #fde68a; }
        to   { fill: #ffffff; }
      }
    </style>
  </defs>

  <rect width="900" height="220" fill="#0d1117" rx="16"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="JetBrains Mono" font-size="15" font-weight="700" fill="#e9d5ff">🌟  ACHIEVEMENTS  🌟</text>
  <line x1="200" y1="36" x2="700" y2="36" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- ── CARD 1: Google Top 1,500 ── -->
  <g class="a1 glow-gold">
    <!-- 3D depth -->
    <rect x="52" y="58" width="238" height="135" rx="14" fill="#2a1800" opacity="0.55"/>
    <rect x="48" y="54" width="238" height="135" rx="14" fill="#331e00" opacity="0.65"/>
    <!-- Main -->
    <rect x="44" y="50" width="238" height="135" rx="14" fill="#1c1000" stroke="#f59e0b" stroke-width="2.5"/>
    <rect x="44" y="50" width="238" height="65" rx="14" fill="white" class="shine"/>
    <rect x="44" y="50" width="238" height="7" rx="4" fill="#f59e0b"/>
    <!-- Pulse ring -->
    <circle cx="163" cy="95" r="36" fill="none" stroke="#f59e0b" class="ring"/>
    <circle cx="163" cy="95" r="26" fill="#f59e0b" opacity="0.12"/>
    <text x="163" y="86" text-anchor="middle" font-size="22">🏆</text>
    <text x="163" y="106" text-anchor="middle" font-family="JetBrains Mono" font-size="19" font-weight="800" fill="#fde68a" class="counter">1,500</text>
    <text x="163" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="#fbbf24">TOP RANK GLOBALLY</text>
    <text x="163" y="133" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#d97706">Big Code by Google '26</text>
    <text x="163" y="147" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#78350f">1,50,000+ Participants</text>
    <rect x="94" y="155" width="138" height="18" rx="9" fill="#f59e0b" opacity="0.18"/>
    <text x="163" y="168" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#fde68a">🏅 Mar 2026</text>
  </g>

  <!-- ── CARD 2: 800+ DSA ── -->
  <g class="a2 glow-fire">
    <rect x="337" y="58" width="228" height="135" rx="14" fill="#2a0000" opacity="0.55"/>
    <rect x="333" y="54" width="228" height="135" rx="14" fill="#330000" opacity="0.65"/>
    <rect x="329" y="50" width="228" height="135" rx="14" fill="#1a0000" stroke="#ef4444" stroke-width="2.5"/>
    <rect x="329" y="50" width="228" height="65" rx="14" fill="white" class="shine"/>
    <rect x="329" y="50" width="228" height="7" rx="4" fill="#ef4444"/>
    <circle cx="443" cy="95" r="36" fill="none" stroke="#ef4444" class="ring"/>
    <circle cx="443" cy="95" r="26" fill="#ef4444" opacity="0.12"/>
    <text x="443" y="86" text-anchor="middle" font-size="22">🔥</text>
    <text x="443" y="106" text-anchor="middle" font-family="JetBrains Mono" font-size="19" font-weight="800" fill="#fca5a5" class="counter">800+</text>
    <text x="443" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="#f87171">DSA PROBLEMS SOLVED</text>
    <text x="443" y="133" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#dc2626">LeetCode · HackerRank</text>
    <text x="443" y="147" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#7f1d1d">Strong DSA Focus</text>
    <rect x="384" y="155" width="118" height="18" rx="9" fill="#ef4444" opacity="0.18"/>
    <text x="443" y="168" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#fca5a5">🔥 Mar 2026</text>
  </g>

  <!-- ── CARD 3: HackerRank Stars ── -->
  <g class="a3 glow-star">
    <rect x="622" y="58" width="228" height="135" rx="14" fill="#1a0a33" opacity="0.55"/>
    <rect x="618" y="54" width="228" height="135" rx="14" fill="#210e3f" opacity="0.65"/>
    <rect x="614" y="50" width="228" height="135" rx="14" fill="#0f0620" stroke="#a78bfa" stroke-width="2.5"/>
    <rect x="614" y="50" width="228" height="65" rx="14" fill="white" class="shine"/>
    <rect x="614" y="50" width="228" height="7" rx="4" fill="#a78bfa"/>
    <circle cx="728" cy="95" r="36" fill="none" stroke="#a78bfa" class="ring"/>
    <circle cx="728" cy="95" r="26" fill="#a78bfa" opacity="0.12"/>
    <text x="728" y="83" text-anchor="middle" font-size="16">⭐⭐⭐⭐⭐</text>
    <text x="728" y="104" text-anchor="middle" font-family="JetBrains Mono" font-size="14" font-weight="800" fill="#c4b5fd" class="counter">5★ Java</text>
    <text x="728" y="120" text-anchor="middle" font-family="JetBrains Mono" font-size="8" font-weight="700" fill="#a78bfa">3★ PYTHON · HACKERRANK</text>
    <text x="728" y="133" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#7c3aed">Algorithmic Problem</text>
    <text x="728" y="147" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#4c1d95">Solving Expert</text>
    <rect x="669" y="155" width="118" height="18" rx="9" fill="#a78bfa" opacity="0.18"/>
    <text x="728" y="168" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#c4b5fd">⭐ Sep 2025</text>
  </g>

  <rect width="900" height="220" fill="none" rx="16" stroke="#7c3aed" stroke-width="1.5" opacity="0.35"/>
</svg>
