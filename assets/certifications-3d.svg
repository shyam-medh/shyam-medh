      <text x="88" y="159" text-anchor="middle" font-family="JetBrains Mono" font-size="9" font-weight="700" fill="#ffffff">Associate</text>
      <rect x="34" y="165" width="108" height="1" fill="#0078D4" opacity="0.4"/>
      <text x="88" y="177" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#93c5fd">AZ-104</text>
      <text x="88" y="189" text-anchor="middle" font-family="JetBrains Mono" font-size="8" fill="#64748b">May 2026</text>
      <!-- Click badge -->
