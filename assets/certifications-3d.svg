  <line x1="180" y1="36" x2="720" y2="36" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- ───── CARD 1: Azure AZ-104 ───── -->
  <g class="c1 glow-az">
    <a href="https://learn.microsoft.com/en-us/users/shyambaranwal/credentials/" target="_blank">
