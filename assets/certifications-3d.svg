      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .font { font-family: 'JetBrains Mono', monospace; }
      .card { transition: transform 0.3s; }
      .card:hover { transform: scale(1.04); }

      /* Per-card float */
      .c1 { animation: cf1 3.4s ease-in-out infinite; }
      .c2 { animation: cf2 4.0s ease-in-out infinite; }
      .c3 { animation: cf3 3.1s ease-in-out infinite; }
      .c4 { animation: cf4 3.7s ease-in-out infinite; }
      .c5 { animation: cf5 2.8s ease-in-out infinite; }
      @keyframes cf1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes cf2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
      @keyframes cf3 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      @keyframes cf4 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes cf5 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

      .glow-az { filter: drop-shadow(0 0 12px #0078D4aa); }
      .glow-aws { filter: drop-shadow(0 0 12px #FF9900aa); }
      .glow-hr  { filter: drop-shadow(0 0 12px #00EA64aa); }
      .glow-co  { filter: drop-shadow(0 0 12px #0056D2aa); }
      .glow-gb  { filter: drop-shadow(0 0 12px #7C3AEDaa); }

      .shine { animation: shinePulse 2s ease-in-out infinite alternate; }
      @keyframes shinePulse {
        from { opacity: 0.05; }
        to   { opacity: 0.18; }
      }
    </style>
