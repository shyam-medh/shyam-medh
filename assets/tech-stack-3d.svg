<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
      .bg { fill: #0d1117; }
      .card {
        fill: #161b22;
        stroke: #7c3aed;
        stroke-width: 1.5;
        rx: 12;
        filter: drop-shadow(0 0 10px #7c3aed88);
      }
      .label { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #c4b5fd; font-weight: 700; }
      .cube-top    { fill: #a78bfa; }
      .cube-left   { fill: #6d28d9; }
      .cube-right  { fill: #4c1d95; }
      .cube-stroke { stroke: #c4b5fd; stroke-width: 0.8; }

      /* Float animations per card */
      .g1 { animation: float1 3.2s ease-in-out infinite; }
      .g2 { animation: float2 3.8s ease-in-out infinite; }
      .g3 { animation: float3 2.9s ease-in-out infinite; }
      .g4 { animation: float4 3.5s ease-in-out infinite; }
      .g5 { animation: float5 3.1s ease-in-out infinite; }
      .g6 { animation: float6 4.0s ease-in-out infinite; }
      .g7 { animation: float7 2.7s ease-in-out infinite; }
      .g8 { animation: float8 3.3s ease-in-out infinite; }
      .g9 { animation: float9 3.6s ease-in-out infinite; }

      @keyframes float1 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-8px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-10px)} }
      @keyframes float3 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
      @keyframes float4 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-9px)} }
      @keyframes float5 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-7px)} }
      @keyframes float6 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-11px)} }
      @keyframes float7 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-8px)} }
      @keyframes float8 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-9px)} }
      @keyframes float9 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-7px)} }

      .glow { animation: glowPulse 2s ease-in-out infinite alternate; }
      @keyframes glowPulse {
        from { filter: drop-shadow(0 0 6px #7c3aed99); }
        to   { filter: drop-shadow(0 0 18px #a78bfacc); }
      }
      .title { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #e9d5ff; font-weight: 700; }
      .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #7c3aed; font-weight: 700; }
    </style>
    <!-- 3D cube face clip -->
    <filter id="shadow3d">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#0d1117" rx="16"/>
  <!-- Subtle grid -->
  <g opacity="0.07" stroke="#7c3aed" stroke-width="0.5">
    <line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0"  x2="100" y2="320"/>
    <line x1="200" y1="0"  x2="200" y2="320"/>
    <line x1="300" y1="0"  x2="300" y2="320"/>
    <line x1="400" y1="0"  x2="400" y2="320"/>
    <line x1="500" y1="0"  x2="500" y2="320"/>
    <line x1="600" y1="0"  x2="600" y2="320"/>
    <line x1="700" y1="0"  x2="700" y2="320"/>
    <line x1="800" y1="0"  x2="800" y2="320"/>
  </g>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title" font-size="16" fill="#e9d5ff">⚡  3D TECH STACK UNIVERSE  ⚡</text>
  <line x1="200" y1="38" x2="700" y2="38" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- ROW 1: 5 tech cubes -->

  <!-- PYTHON -->
  <g class="g1 glow" transform="translate(55,60)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- 3D cube isometric -->
    <polygon points="65,8  95,24  65,40  35,24" fill="#4B8BBE" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#2e6da4" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#1d4e7a" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#93c5fd">Python</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">BACKEND CORE</text>
  </g>

  <!-- JAVA -->
  <g class="g2 glow" transform="translate(205,60)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#f97316" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#ED8B00" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#b36800" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#7a4700" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#fed7aa">Java</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">OOP / SWING</text>
  </g>

  <!-- DJANGO -->
  <g class="g3 glow" transform="translate(355,60)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#10b981" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#092E20" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#0a4a33" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#064023" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#6ee7b7">Django</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">REST FRAMEWORK</text>
  </g>

  <!-- AWS -->
  <g class="g4 glow" transform="translate(505,60)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#f59e0b" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#FF9900" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#cc7700" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#995900" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#fde68a">AWS</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">EC2·S3·RDS·IAM</text>
  </g>

  <!-- DOCKER -->
  <g class="g5 glow" transform="translate(655,60)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#2496ED" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#2496ED" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#1a6eb5" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#10477a" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#bae6fd">Docker</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">CONTAINERS</text>
  </g>

  <!-- ROW 2 -->

  <!-- KUBERNETES -->
  <g class="g6 glow" transform="translate(130,175)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#326CE5" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#326CE5" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#2050b0" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#153880" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#a5b4fc">Kubernetes</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">ORCHESTRATION</text>
  </g>

  <!-- JENKINS -->
  <g class="g7 glow" transform="translate(280,175)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#D33833" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#D33833" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#a02828" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#6e1b1b" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#fca5a5">Jenkins</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">CI/CD PIPELINE</text>
  </g>

  <!-- AZURE -->
  <g class="g8 glow" transform="translate(430,175)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#0078D4" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#0078D4" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#005a9e" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#003c6e" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#93c5fd">Azure</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">AZ-104 CERTIFIED</text>
  </g>

  <!-- MYSQL -->
  <g class="g9 glow" transform="translate(580,175)">
    <rect width="130" height="95" rx="12" fill="#161b22" stroke="#4479A1" stroke-width="1.5"/>
    <polygon points="65,8  95,24  65,40  35,24" fill="#4479A1" class="cube-stroke"/>
    <polygon points="35,24  65,40  65,58  35,42" fill="#2e5a7a" class="cube-stroke"/>
    <polygon points="65,40  95,24  95,42  65,58" fill="#1a3d56" class="cube-stroke"/>
    <text x="65" y="75" text-anchor="middle" class="label" fill="#bae6fd">MySQL</text>
    <text x="65" y="87" text-anchor="middle" class="subtitle">DATABASES</text>
  </g>

  <!-- Border glow -->
  <rect width="900" height="320" fill="none" rx="16" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
</svg>
